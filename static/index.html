<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SuchiScan</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%BE%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="toast-container"></div>
  <div id="app">
    <header>
      <h1 class="logo" id="logo">Suchi<span class="accent">Scan</span></h1>
      <p class="tagline">Payment screenshots in. Clean, verifiable ledger out.</p>
    </header>

    <section id="view-menu" class="view">
      <div class="toolbar">
        <div id="upload-area" class="upload-area">
          <input type="file" id="file-input" multiple accept="image/*" hidden>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg>
          <p>Drag screenshots here, or <button id="browse-btn" class="link-btn">browse</button></p>
        </div>
        <div class="toolbar-actions">
          <button id="process-folder-btn" class="secondary">Process folder</button>
          <button id="export-btn" class="primary">Download Excel</button>
        </div>
      </div>

      <div class="metrics">
        <div class="metric-card"><div class="label">Payments</div><div class="value" id="m-count">0</div></div>
        <div class="metric-card"><div class="label">Total amount</div><div class="value green" id="m-total">₹0</div></div>
        <div class="metric-card"><div class="label">Needs review</div><div class="value amber" id="m-review">0</div></div>
        <div class="metric-card"><div class="label">Avg OCR confidence</div><div class="value" id="m-conf">0%</div></div>
      </div>

      <div class="filters">
        <select id="filter-app"><option value="">All apps</option></select>
        <select id="filter-status"><option value="">All statuses</option></select>
        <input type="text" id="filter-search" placeholder="Search name or transaction ID">
      </div>

      <div id="payment-list" class="payment-list"></div>
      <p id="empty-state" class="empty-state hidden">No payments yet. Drop screenshots above to get started.</p>
    </section>

    <section id="view-detail" class="view hidden">
      <button id="back-btn" class="link-btn">&larr; Back to list</button>
      <div class="detail-pane">
        <div class="detail-left" id="detail-left">
          <div id="detail-fields"></div>
          <p class="review-reasons" id="detail-reasons"></p>
          <div class="detail-actions">
            <button id="edit-btn" class="secondary">Edit</button>
            <button id="save-btn" class="primary hidden">Save</button>
            <button id="cancel-btn" class="secondary hidden">Cancel</button>
          </div>

          <div class="notes-block">
            <div class="notes-header">
              <label for="detail-notes">Notes</label>
              <span class="notes-status" id="notes-status"></span>
            </div>
            <textarea id="detail-notes" placeholder="Anything to remember or flag about this one…" rows="3"></textarea>
          </div>
        </div>
        <div class="detail-right">
          <img id="detail-image" src="" alt="Screenshot">
        </div>
      </div>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
